services:
  rapisys:
    # Build locally from source (see README) or use your own registry image.
    build: .
    image: rapisys:latest
    container_name: rapisys
    restart: unless-stopped

    # uid 990 = rapisys user baked into the image; gid from .env (host group)
    user: "990:${RAPISYS_GID:-990}"

    env_file:
      - .env            # generated by deploy.sh (tokens + secrets)

    environment:
      - PORT=3001
      - SETTINGS_CONFIG=/app/data/settings.json
      - DATA_DIR=/app/data
      - AGENT_SOCKET=/run/rapisys/agent.sock
      - SAMPLE_INTERVAL_S=10

    volumes:
      # Persistent settings + local/fallback database
      - ./data:/app/data

      # System monitoring (required)
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro

      # Docker container monitoring
      - /var/run/docker.sock:/var/run/docker.sock:ro

      # WireGuard config (client name mapping)
      - /etc/wireguard:/etc/wireguard:ro

      # RaPiSys host agent socket (created by deploy.sh / systemd)
      - /run/rapisys:/run/rapisys

      # NAS mounts managed by the agent (DB can live here).
      # rslave propagation is ESSENTIAL: the agent mounts shares on the
      # host while the container is running — with the default private
      # propagation those mounts never appear (or appear as dead stale
      # entries -> ELOOP/ENODEV) inside the container.
      - /mnt/rapisys:/mnt/rapisys:rslave

    # Host namespaces for full system visibility
    pid: host
    network_mode: host

    # Container is non-root; only WireGuard monitoring needs NET_ADMIN
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
